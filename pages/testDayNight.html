<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-800">

  <!-- NAVBAR -->
  <nav class="bg-white dark:bg-gray-900 shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-2 flex justify-between items-center">

      <span class="text-xl font-bold dark:text-gray-200">Test Page</span>

      <!-- Desktop Toggle -->
      <button id="themeToggle"
              class="hidden md:block text-2xl text-gray-700 dark:text-gray-200">
        🌙
      </button>

      <!-- Hamburger -->
      <button id="hamburger"
              class="md:hidden text-3xl text-gray-700 dark:text-gray-200">
        ☰
      </button>

    </div>

    <!-- Mobile Menu -->
    <div id="mobileMenu"
         class="hidden flex-col bg-white dark:bg-gray-900 px-6 py-4 space-y-3 text-lg">

      <button id="themeToggleMobile"
              class="text-2xl text-gray-700 dark:text-gray-200">
        🌙
      </button>

    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="max-w-6xl mx-auto px-6 py-10">
    <h1 class="text-3xl font-bold dark:text-gray-200">Dark Mode Test</h1>
    <p class="mt-4 dark:text-gray-300">Toggle the theme using the moon icon.</p>
  </div>

  <!-- SCRIPT -->
  <script>
    // Hamburger toggle
    const burger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    burger.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });

    // Dark mode toggle
    const themeToggle =
      document.getElementById('themeToggle') ||
      document.getElementById('themeToggleMobile');

    // Apply saved theme
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark');
      themeToggle.textContent = '☀️';
    }

    // Toggle theme
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');

      if (document.documentElement.classList.contains('dark')) {
        localStorage.setItem('theme', 'dark');
        themeToggle.textContent = '☀️';
      } else {
        localStorage.setItem('theme', 'light');
        themeToggle.textContent = '🌙';
      }
    });
  </script>

</body>
</html>
