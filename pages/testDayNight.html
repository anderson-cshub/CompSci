<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-800">

  <!-- NAVBAR  -->
  <div id="navbar"></div>

  <div class="max-w-6xl mx-auto px-6 py-10">
    <h1 class="text-3xl font-bold dark:text-gray-200">Dark Mode Test</h1>
    <p class="mt-4 dark:text-gray-300">Toggle the theme using the moon icon.</p>
  </div>

  <script>
    console.log("SCRIPT IS RUNNING");

    fetch("/CompSci/components/navbar.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("navbar").innerHTML = html;

        // MOBILE MENU
        const burger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');

        if (burger) {
          burger.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
          });
        }

        // DARK MODE TOGGLE
        const themeToggle =
          document.getElementById('themeToggle') ||
          document.getElementById('themeToggleMobile');

        console.log("Toggle element:", themeToggle);

        if (!themeToggle) return;

        // Apply saved theme
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.classList.add('dark');
          themeToggle.textContent = '☀️';
        }

        // Toggle theme
        themeToggle.addEventListener('click', () => {
          document.documentElement.classList.toggle('dark');

          if (document.documentElement.classList.contains('dark')) {
            localStorage.setItem('theme', 'dark');
            themeToggle.textContent = '☀️';
          } else {
            localStorage.setItem('theme', 'light');
            themeToggle.textContent = '🌙';
          }
        });
      });
  </script>

</body>
</html>
