 <!-- NAVBAR + DARK MODE SCRIPT -->
  <script>
    const currentPageKey = document.body.dataset.page;

    fetch("/CompSci/components/navbar.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;

        // Highlight active link
        document.querySelectorAll('#navbar a').forEach(link => {
          const page = link.dataset.page;

          if (page === currentPageKey) {
            link.classList.add('nav-link-active');
            link.classList.remove('border-transparent', 'text-gray-700');
          } else {
            link.classList.remove('nav-link-active');
            link.classList.add('border-transparent', 'text-gray-700');
          }
        });

        // Hamburger toggle
        const burger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');

        if (burger && mobileMenu) {
          burger.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
          });
        }

        // Dark mode logic
        const themeToggle = document.getElementById('themeToggle');

        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.classList.add('dark');
          themeToggle.textContent = '☀️';
        }

        if (!localStorage.getItem('theme')) {
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (prefersDark) {
            document.documentElement.classList.add('dark');
            themeToggle.textContent = '☀️';
          }
        }

        themeToggle.addEventListener('click', () => {
          document.documentElement.classList.toggle('dark');

          if (document.documentElement.classList.contains('dark')) {
            localStorage.setItem('theme', 'dark');
            themeToggle.textContent = '☀️';
          } else {
            localStorage.setItem('theme', 'light');
            themeToggle.textContent = '🌙';
          }
        });
      });
  </script>
